<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 78" shape-rendering="crispEdges" aria-hidden="true">
  <!-- Pixel-art dancer, disco pose: right arm pointing up-right, left arm on hip, one leg kicked -->
  <g fill="#c975e8">
    <!-- Whole-body bounce -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -1; 0 0; 0 0.5; 0 0" dur="1s" repeatCount="indefinite"/>

      <!-- Head -->
      <g>
        <rect x="15" y="0" width="12" height="3"/>
        <rect x="12" y="3" width="18" height="3"/>
        <rect x="12" y="6" width="18" height="3"/>
        <rect x="12" y="9" width="18" height="3"/>
        <rect x="15" y="12" width="12" height="3"/>
        <!-- neck -->
        <rect x="18" y="15" width="6" height="3"/>
      </g>

      <!-- Torso -->
      <g>
        <rect x="15" y="18" width="12" height="3"/>
        <rect x="12" y="21" width="18" height="3"/>
        <rect x="12" y="24" width="18" height="3"/>
        <rect x="12" y="27" width="18" height="3"/>
        <rect x="9"  y="30" width="24" height="3"/>
        <rect x="9"  y="33" width="24" height="3"/>
        <rect x="9"  y="36" width="24" height="3"/>
        <rect x="9"  y="39" width="24" height="3"/>
        <rect x="9"  y="42" width="24" height="3"/>
        <rect x="9"  y="45" width="24" height="3"/>
        <rect x="9"  y="48" width="24" height="3"/>
        <rect x="9"  y="51" width="24" height="3"/>
        <rect x="12" y="54" width="18" height="3"/>
        <rect x="12" y="57" width="18" height="3"/>
      </g>

      <!-- Left arm (bent, on hip) -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="-4 12 21; 4 12 21; -4 12 21" dur="1s" repeatCount="indefinite"/>
        <rect x="6"  y="24" width="3" height="3"/>
        <rect x="3"  y="27" width="6" height="3"/>
        <rect x="3"  y="30" width="6" height="3"/>
        <rect x="6"  y="33" width="6" height="3"/>
        <rect x="9"  y="36" width="3" height="3"/>
      </g>

      <!-- Right arm (pointing up-right) -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="5 33 24; -6 33 24; 5 33 24" dur="1s" repeatCount="indefinite"/>
        <rect x="33" y="21" width="6" height="3"/>
        <rect x="36" y="18" width="6" height="3"/>
        <rect x="39" y="15" width="6" height="3"/>
        <rect x="42" y="12" width="6" height="3"/>
        <rect x="42" y="9"  width="6" height="3"/>
        <rect x="45" y="6"  width="3" height="3"/>
      </g>

      <!-- Left leg (bent / lifted) -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="-6 15 60; 4 15 60; -6 15 60" dur="1s" repeatCount="indefinite"/>
        <rect x="12" y="60" width="6" height="3"/>
        <rect x="9"  y="63" width="6" height="3"/>
        <rect x="6"  y="66" width="6" height="3"/>
        <rect x="3"  y="69" width="6" height="3"/>
        <rect x="0"  y="72" width="9" height="3"/>
        <rect x="0"  y="75" width="9" height="3"/>
      </g>

      <!-- Right leg (planted, support) -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="3 27 60; -3 27 60; 3 27 60" dur="1s" repeatCount="indefinite"/>
        <rect x="24" y="60" width="6" height="3"/>
        <rect x="24" y="63" width="6" height="3"/>
        <rect x="24" y="66" width="6" height="3"/>
        <rect x="24" y="69" width="6" height="3"/>
        <rect x="21" y="72" width="9" height="3"/>
        <rect x="21" y="75" width="9" height="3"/>
      </g>
    </g>

    <!-- Decorative blinking pixels (disco feel) -->
    <g>
      <rect x="0"  y="18" width="2" height="2"><animate attributeName="opacity" values="0;1;0" dur="1.6s" repeatCount="indefinite"/></rect>
      <rect x="46" y="30" width="2" height="2"><animate attributeName="opacity" values="1;0;1" dur="1.9s" repeatCount="indefinite"/></rect>
      <rect x="2"  y="42" width="2" height="2"><animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite"/></rect>
      <rect x="44" y="50" width="2" height="2"><animate attributeName="opacity" values="1;0;1" dur="1.7s" repeatCount="indefinite"/></rect>
      <rect x="0"  y="60" width="2" height="2"><animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite"/></rect>
      <rect x="46" y="68" width="2" height="2"><animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/></rect>
    </g>
  </g>
</svg>
