<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" aria-hidden="true">
  <!-- Point-cloud dancer, left arm straight up, right arm extended to the side, kicking leg -->
  <g fill="#e1212a">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 2; 0 0; 0 -3; 0 0" dur="1.3s" repeatCount="indefinite"/>

      <!-- Head -->
      <g>
        <circle cx="55" cy="10" r="1.8"/><circle cx="60" cy="8" r="2.2"/><circle cx="65" cy="10" r="2"/>
        <circle cx="50" cy="14" r="2"/><circle cx="55" cy="13" r="2.1"/><circle cx="60" cy="12" r="2.3"/>
        <circle cx="65" cy="13" r="2.1"/><circle cx="70" cy="14" r="2"/>
        <circle cx="52" cy="18" r="2.1"/><circle cx="57" cy="17" r="2"/><circle cx="62" cy="17" r="2.3"/>
        <circle cx="67" cy="18" r="2"/><circle cx="72" cy="19" r="2.1"/>
        <circle cx="54" cy="22" r="2.2"/><circle cx="59" cy="21" r="2"/><circle cx="64" cy="21" r="2.1"/>
        <circle cx="69" cy="22" r="2.2"/>
        <circle cx="56" cy="26" r="2"/><circle cx="61" cy="26" r="2.1"/><circle cx="66" cy="26" r="2"/>
        <circle cx="58" cy="30" r="1.9"/><circle cx="62" cy="30" r="1.9"/>
      </g>

      <!-- Torso -->
      <g>
        <circle cx="48" cy="36" r="2"/><circle cx="52" cy="35" r="2.2"/><circle cx="56" cy="34" r="2.1"/>
        <circle cx="60" cy="33" r="2.3"/><circle cx="64" cy="34" r="2"/><circle cx="68" cy="35" r="2.1"/>
        <circle cx="72" cy="36" r="2"/>
        <circle cx="47" cy="42" r="2.1"/><circle cx="52" cy="41" r="2"/><circle cx="57" cy="40" r="2.3"/>
        <circle cx="62" cy="40" r="2"/><circle cx="67" cy="41" r="2.2"/><circle cx="72" cy="42" r="2"/>
        <circle cx="48" cy="48" r="2"/><circle cx="53" cy="47" r="2.3"/><circle cx="58" cy="46" r="2"/>
        <circle cx="63" cy="46" r="2.1"/><circle cx="68" cy="47" r="2"/><circle cx="73" cy="48" r="2.2"/>
        <circle cx="49" cy="54" r="2.1"/><circle cx="54" cy="53" r="2"/><circle cx="59" cy="52" r="2.3"/>
        <circle cx="64" cy="52" r="2.1"/><circle cx="69" cy="53" r="2"/><circle cx="74" cy="54" r="2"/>
        <circle cx="50" cy="60" r="2"/><circle cx="55" cy="59" r="2.1"/><circle cx="60" cy="58" r="2.2"/>
        <circle cx="65" cy="59" r="2"/><circle cx="70" cy="60" r="2.1"/>
        <circle cx="51" cy="66" r="2.1"/><circle cx="56" cy="65" r="2"/><circle cx="61" cy="64" r="2.2"/>
        <circle cx="66" cy="65" r="2.1"/><circle cx="71" cy="66" r="2"/>
        <circle cx="52" cy="72" r="2"/><circle cx="57" cy="71" r="2.2"/><circle cx="62" cy="71" r="2"/>
        <circle cx="67" cy="72" r="2.1"/><circle cx="72" cy="73" r="2"/>
        <circle cx="53" cy="78" r="2.1"/><circle cx="58" cy="78" r="2"/><circle cx="63" cy="78" r="2.2"/>
        <circle cx="68" cy="79" r="2"/>
        <circle cx="52" cy="84" r="2.2"/><circle cx="58" cy="84" r="2"/><circle cx="64" cy="84" r="2.1"/>
        <circle cx="70" cy="84" r="2"/>
        <circle cx="52" cy="90" r="2"/><circle cx="58" cy="90" r="2.3"/><circle cx="64" cy="90" r="2"/>
        <circle cx="70" cy="90" r="2.2"/>
      </g>

      <!-- Left arm straight up -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="-4 50 36; 6 50 36; -4 50 36" dur="1.3s" repeatCount="indefinite"/>
        <circle cx="49" cy="32" r="2.1"/><circle cx="48" cy="28" r="2"/><circle cx="48" cy="24" r="2.2"/>
        <circle cx="47" cy="20" r="2"/><circle cx="46" cy="16" r="2.1"/><circle cx="46" cy="12" r="2.2"/>
        <circle cx="45" cy="8" r="2"/><circle cx="44" cy="4" r="2.1"/>
        <circle cx="51" cy="30" r="1.8"/><circle cx="50" cy="26" r="1.9"/><circle cx="50" cy="22" r="1.8"/>
        <circle cx="49" cy="18" r="1.8"/><circle cx="48" cy="14" r="1.9"/><circle cx="48" cy="10" r="1.8"/>
        <circle cx="47" cy="6" r="1.8"/>
      </g>

      <!-- Right arm extended to the side -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="4 70 36; -8 70 36; 4 70 36" dur="1.3s" repeatCount="indefinite"/>
        <circle cx="74" cy="36" r="2"/><circle cx="78" cy="37" r="2.1"/><circle cx="82" cy="38" r="2.2"/>
        <circle cx="86" cy="39" r="2"/><circle cx="90" cy="40" r="2.1"/><circle cx="94" cy="41" r="2.2"/>
        <circle cx="98" cy="42" r="2"/><circle cx="102" cy="43" r="2.1"/><circle cx="106" cy="44" r="2"/>
        <circle cx="110" cy="45" r="2.1"/>
        <circle cx="76" cy="34" r="1.8"/><circle cx="80" cy="35" r="1.9"/><circle cx="84" cy="36" r="1.8"/>
        <circle cx="88" cy="37" r="1.8"/><circle cx="92" cy="38" r="1.9"/><circle cx="96" cy="39" r="1.8"/>
        <circle cx="100" cy="40" r="1.8"/><circle cx="104" cy="41" r="1.7"/><circle cx="108" cy="42" r="1.7"/>
      </g>

      <!-- Left leg (planted) -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0 54 92; 3 54 92; 0 54 92" dur="1.3s" repeatCount="indefinite"/>
        <circle cx="52" cy="96" r="2.2"/><circle cx="52" cy="102" r="2"/><circle cx="51" cy="108" r="2.1"/>
        <circle cx="51" cy="114" r="2"/><circle cx="50" cy="120" r="2.2"/><circle cx="50" cy="126" r="2"/>
        <circle cx="49" cy="132" r="2.1"/><circle cx="49" cy="138" r="2"/><circle cx="48" cy="144" r="2.2"/>
        <circle cx="48" cy="150" r="2"/><circle cx="47" cy="156" r="2.1"/><circle cx="47" cy="162" r="2"/>
        <circle cx="46" cy="168" r="2.2"/><circle cx="45" cy="174" r="2"/>
        <circle cx="56" cy="98" r="2"/><circle cx="56" cy="104" r="2.1"/><circle cx="55" cy="110" r="2"/>
        <circle cx="55" cy="116" r="2.2"/><circle cx="54" cy="122" r="2"/><circle cx="54" cy="128" r="2"/>
        <circle cx="53" cy="134" r="2.1"/><circle cx="53" cy="140" r="2"/>
      </g>

      <!-- Right leg (kicked out to the right) -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="8 68 92; -2 68 92; 8 68 92" dur="1.3s" repeatCount="indefinite"/>
        <circle cx="70" cy="96" r="2.2"/><circle cx="74" cy="100" r="2"/><circle cx="78" cy="104" r="2.1"/>
        <circle cx="82" cy="108" r="2"/><circle cx="86" cy="112" r="2.2"/><circle cx="90" cy="116" r="2"/>
        <circle cx="94" cy="120" r="2.1"/><circle cx="98" cy="124" r="2"/><circle cx="102" cy="128" r="2.2"/>
        <circle cx="106" cy="132" r="2"/>
        <circle cx="66" cy="98" r="2"/><circle cx="70" cy="102" r="2.1"/><circle cx="74" cy="106" r="2"/>
        <circle cx="78" cy="110" r="2.2"/><circle cx="82" cy="114" r="2"/><circle cx="86" cy="118" r="2"/>
        <circle cx="90" cy="122" r="2.1"/><circle cx="94" cy="126" r="2"/><circle cx="98" cy="130" r="2.2"/>
      </g>
    </g>

    <!-- Scatter particles with pulsing opacity -->
    <g opacity="0.55">
      <circle cx="12" cy="30" r="1.3"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.1s" repeatCount="indefinite"/></circle>
      <circle cx="8" cy="55" r="1.5"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" repeatCount="indefinite"/></circle>
      <circle cx="16" cy="85" r="1.2"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.9s" repeatCount="indefinite"/></circle>
      <circle cx="114" cy="70" r="1.3"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.3s" repeatCount="indefinite"/></circle>
      <circle cx="110" cy="100" r="1.4"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="1.8s" repeatCount="indefinite"/></circle>
      <circle cx="115" cy="140" r="1.2"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.6s" repeatCount="indefinite"/></circle>
      <circle cx="30" cy="150" r="1.3"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/></circle>
      <circle cx="80" cy="160" r="1.4"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.2s" repeatCount="indefinite"/></circle>
      <circle cx="20" cy="170" r="1.2"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="2.4s" repeatCount="indefinite"/></circle>
    </g>
  </g>
</svg>
